<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Shop Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <script src="https://www.paypal.com/sdk/js?client-id=ATDjFyQ0eQ5KZXBVWrd4fpPeOcTLIVCXzitw8Egt6u16RroY4TTCFCJLJ0jiFnR_r-Frj0hANHUbCLHi&currency=EUR&intent=capture"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');

        body {
            font-family: 'Inter', system-ui, sans-serif;
        }

        .title-font {
            font-family: 'Space Grotesk', sans-serif;
        }

        .glass {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-25px); }
        }

        .floating-img {
            animation: float 4s ease-in-out infinite;
        }

        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>

<body class="bg-gradient-to-br from-zinc-950 via-purple-950 to-black text-white min-h-screen">

<!-- ================= PAGE 1 ================= -->
<div id="page1" class="page active max-w-4xl mx-auto px-6 py-12">

    <div class="flex items-center gap-3 mb-16">
        <div class="w-9 h-9 bg-gradient-to-br from-pink-500 to-purple-600 rounded-2xl flex items-center justify-center text-xl">🚀</div>
        <h1 class="title-font text-4xl font-semibold tracking-tighter">
            Trouver des prosperts rapiement
        </h1>
    </div>

    <div class="grid md:grid-cols-3 gap-8">

        <div class="glass p-8 rounded-3xl">
            <p class="text-pink-400">TikTok</p>
            <p class="text-2xl">@argent.ligne</p>
            <a href="https://www.tiktok.com/@argent.ligne" target="_blank" class="block mt-4 bg-white text-black py-3 rounded-xl text-center">
                Visiter
            </a>
        </div>

        <div class="glass p-8 rounded-3xl">
            <p class="text-pink-400">Instagram</p>
            <p class="text-2xl">@paolo.49k</p>
            <a href="https://www.instagram.com/paolo.49k/" target="_blank" class="block mt-4 bg-white text-black py-3 rounded-xl text-center">
                Visiter
            </a>
        </div>

        <div class="glass p-8 rounded-3xl">
            <p class="text-emerald-400">Produit</p>
            <a id="product-link-page1" href="URL_DU_PRODUIT_QUE_TU_METTRAS_ICI" target="_blank"
               class="block mt-4 bg-emerald-400 text-black py-3 rounded-xl text-center">
               Accéder au produit
            </a>
        </div>

    </div>

    <div class="mt-16 text-center">
        <button onclick="goToPage(2)" class="bg-white text-black px-10 py-6 rounded-2xl text-xl">
            Passez à la page suivante →
        </button>
    </div>

</div>

<!-- ================= PAGE 2 ================= -->
<div id="page2" class="page max-w-5xl mx-auto px-6 py-12">

    <a onclick="goToPage(1)" class="cursor-pointer text-purple-300 mb-6 inline-block">
        ← Retour
    </a>

    <div class="grid md:grid-cols-2 gap-16 items-center">

        <div>
            <img src="https://picsum.photos/id/1015/800/1000"
                 class="floating-img rounded-3xl shadow-2xl">
        </div>

        <div>
            <h1 class="text-5xl font-semibold mb-4">
                Trouver des clients rapidement grâce à Google
            </h1>

            <p class="text-2xl text-emerald-400 mb-2">
                Méthode stratégique avec Google Dorks
            </p>

            <p class="text-xl mb-8">50€ • Accès immédiat</p>

            <div id="paypal-button-container"></div>
        </div>

    </div>

</div>

<!-- ================= PAGE 3 ================= -->
<div id="page3" class="page max-w-5xl mx-auto px-6 py-12">

    <a onclick="goToPage(2)" class="cursor-pointer text-purple-300 mb-6 inline-block">
        ← Retour
    </a>

    <h1 class="text-5xl font-semibold mb-10">
        📚 Contenu débloqué
    </h1>

    <div class="space-y-12">

        <!-- 🔥 MET TES IMAGES ICI -->
        <img src="ChatGPT Image 3 avr. 2026, 18_49_03.png" class="w-full rounded-3xl shadow-2xl">
        <img src="Techniques avancées pour trouver des clients.png" class="w-full rounded-3xl shadow-2xl">
        <img src="Stratégie pour transformer les prospects.png" class="w-full rounded-3xl shadow-2xl">
        <img src="Publier et vendre ton ebook rapidement.png" class="w-full rounded-3xl shadow-2xl">

    </div>

</div>

<script>
function goToPage(page) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.getElementById("page" + page).classList.add('active');
}

paypal.Buttons({
    style: {
        layout: 'vertical',
        color: 'gold',
        shape: 'rect',
        label: 'paypal'
    },

    createOrder: function(data, actions) {
        return actions.order.create({
            purchase_units: [{
                amount: {
                    value: '50.00',
                    currency_code: 'EUR'
                },
                description: "Ebook - Trouver des clients rapidement grâce à Google"
            }]
        });
    },

    onApprove: function(data, actions) {
        return actions.order.capture().then(function(details) {
            alert('Paiement réussi ! Merci ' + details.payer.name.given_name + ' 🎉');

            // 👉 REDIRECTION PAGE 3
            goToPage(3);
        });
    },

    onError: function(err) {
        console.error(err);
        alert("Une erreur est survenue.");
    }

}).render('#paypal-button-container');
</script>

</body>
</html>
